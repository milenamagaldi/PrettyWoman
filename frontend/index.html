<!doctype html>
<html lang="pt-BR">
  <head>
    <script>
      // SEGURANÇA
      const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
      if (!usuarioLogado) window.location.href = "login.html";
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scout PowerSoccer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <script src="tema.js"></script>
  </head>
  <body>
    <div id="escudo-bloqueio" class="bloqueio-tela"></div>

    <header class="duo-header">
      <div class="logo"><span class="cor-power">Power</span>Scout</div>

      <div style="display: flex; gap: 15px; align-items: center">
        <a
          href="#"
          id="btn-voltar-menu"
          style="color: #aaa; text-decoration: none; font-weight: bold"
          >⬅ Menu Principal</a
        >
        <span id="nome-treinador" style="color: #aaa; font-weight: bold"></span>
        
        <button
          id="btn-sair"
          style="
            background: none;
            border: none;
            color: gray;
            cursor: pointer;
            font-weight: bold;
          "
        >
          Sair 🚪
        </button>
        <button
          id="btn-settings"
          style="
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            outline: none;
          "
        >
          ⚙️
        </button>
      </div>
    </header>

    <div class="layout-principal">
      <aside class="titulares duo-container">
        <h3>⚽ Titulares</h3>
      </aside>

      <main class="area-campo">
        <div class="campo-container duo-card" id="campo">
          <svg
            id="quadra-svg"
            viewBox="0 0 800 500"
            width="100%"
            height="100%"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="800" height="500" fill="var(--duo-green-primary)" />
            <rect
              x="20"
              y="20"
              width="760"
              height="460"
              fill="none"
              stroke="white"
              stroke-width="4"
              rx="15"
            />
            <line
              x1="400"
              y1="20"
              x2="400"
              y2="480"
              stroke="white"
              stroke-width="4"
            />
            <circle
              cx="400"
              cy="250"
              r="70"
              fill="none"
              stroke="white"
              stroke-width="4"
            />
            <circle cx="400" cy="250" r="6" fill="white" />
            <rect
              x="20"
              y="125"
              width="120"
              height="250"
              fill="none"
              stroke="white"
              stroke-width="4"
              rx="10"
            />
            <rect
              x="660"
              y="125"
              width="120"
              height="250"
              fill="none"
              stroke="white"
              stroke-width="4"
              rx="10"
            />
            <line
              x1="20"
              y1="210"
              x2="20"
              y2="290"
              stroke="#FF4B4B"
              stroke-width="8"
            />
            <line
              x1="780"
              y1="210"
              x2="780"
              y2="290"
              stroke="#FF4B4B"
              stroke-width="8"
            />
          </svg>
        </div>

        <div class="linha-tempo-container duo-card">
          <label for="tempo-video"
            >⏱️ Tempo de Jogo:
            <span id="tempo-display" class="cor-duo">00:00</span></label
          >
          <input type="range" id="tempo-video" min="0" max="2400" value="0" />
        </div>

        <section class="reservas duo-container">
          <h4>Reservas</h4>
          <div class="lista-reservas"></div>
          <button
            id="btn-modo-partida"
            class="btn-acao"
            style="width: 100%; margin-top: 15px"
          >
            ⚙️ Alterar Partida
          </button>
        </section>
      </main>

      <aside class="historico duo-container">
        <h3>📝 Últimos Lances</h3>
        <div id="lista-historico" class="duo-list"></div>
      </aside>
    </div>

    <div id="modal-acao" class="escondido duo-modal">
      <h4 id="modal-titulo">Ação aos 00:00</h4>
      <div class="botoes-acao">
        <button class="btn-acao btn-duo-azul" data-tipo="Passe Certo">
          Passe Certo
        </button>
        <button class="btn-acao btn-duo-vermelho" data-tipo="Passe Errado">
          Passe Errado
        </button>
        <button class="btn-acao btn-duo-laranja" data-tipo="Interceptação">
          Interceptação
        </button>
        <button class="btn-acao btn-duo-roxo" data-tipo="Finalização">
          Finalização
        </button>
        <button class="btn-acao btn-duo-amarelo" data-tipo="Gol">Gol</button>
      </div>
      <button id="fechar-modal" class="btn-cancelar">Cancelar</button>
    </div>

    <div
      id="modal-edicao"
      class="escondido duo-modal"
      style="width: 300px; text-align: center"
    >
      <h4>⚙️ Opções do Lance</h4>
      <div style="margin: 15px 0; text-align: left">
        <label style="font-size: 14px; color: #aaa">Alterar Ação:</label>
        <select
          id="editar-tipo-acao"
          style="
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            background: #444;
            color: white;
            border: none;
          "
        >
          <option value="Passe Certo">Passe Certo</option>
          <option value="Passe Errado">Passe Errado</option>
          <option value="Interceptação">Interceptação</option>
          <option value="Finalização">Finalização</option>
          <option value="Gol">Gol</option>
        </select>
        <label
          style="font-size: 14px; color: #aaa; display: block; margin-top: 10px"
          >Alterar Minuto (MM:SS):</label
        >
        <input
          type="text"
          id="editar-minuto"
          style="
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            background: #444;
            color: white;
            border: none;
            text-align: center;
          "
        />
      </div>
      <div style="display: flex; gap: 10px; flex-direction: column">
        <button id="btn-salvar-edicao" class="btn-acao btn-duo-primary">
          Salvar Alterações
        </button>
        <button id="btn-eliminar-definitivo" class="btn-acao btn-duo-vermelho">
          Eliminar Lance
        </button>
        <button id="btn-cancelar-edicao" class="btn-cancelar">Cancelar</button>
      </div>
    </div>

    <div
      id="modal-substituicao"
      class="escondido duo-modal"
      style="width: 320px; text-align: center"
    >
      <h4>🔄 Substituição</h4>
      <p
        id="texto-substituicao"
        style="margin: 15px 0; font-size: 15px; color: white"
      ></p>
      <div style="display: flex; gap: 10px; flex-direction: column">
        <button id="btn-confirmar-sub" class="btn-acao btn-duo-primary">
          Confirmar
        </button>
        <button id="btn-cancelar-sub" class="btn-cancelar">Cancelar</button>
      </div>
    </div>

    <div
      id="modal-alerta-custom"
      class="escondido duo-modal"
      style="
        width: 320px;
        text-align: center;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 200;
      "
    >
      <h4 id="titulo-alerta-custom" style="color: var(--duo-blue)">Aviso</h4>
      <p
        id="texto-alerta-custom"
        style="margin: 15px 0; font-size: 15px; color: white"
      ></p>
      <button
        id="btn-ok-alerta"
        class="btn-acao btn-duo-primary"
        style="width: 100%"
      >
        Entendido
      </button>
    </div>

    <div
      id="modal-confirm-custom"
      class="escondido duo-modal"
      style="
        width: 320px;
        text-align: center;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 200;
      "
    >
      <h4 id="titulo-confirm-custom" style="color: var(--duo-orange)">
        Atenção
      </h4>
      <p
        id="texto-confirm-custom"
        style="margin: 15px 0; font-size: 15px; color: white"
      ></p>
      <div style="display: flex; gap: 10px; flex-direction: column">
        <button id="btn-sim-confirm" class="btn-acao btn-duo-orange">
          Sim, continuar
        </button>
        <button id="btn-nao-confirm" class="btn-cancelar">Cancelar</button>
      </div>
    </div>

    <div
      id="modal-settings"
      class="escondido duo-modal"
      style="
        width: 320px;
        text-align: center;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 999;
      "
    >
      <h4 style="color: var(--text-main)">⚙️ Definições</h4>
      <div class="form-grupo" style="text-align: left">
        <label
          style="
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
          "
          >Aparência</label
        >
        <button
          id="toggle-tema"
          class="btn-acao"
          style="
            width: 100%;
            background: var(--input-bg);
            color: var(--text-main);
            border: 2px solid transparent;
          "
        >
          🌙 Modo Escuro Ativo
        </button>
      </div>
      <div class="form-grupo" style="margin-top: 20px; text-align: left">
        <label
          style="
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
          "
          >Acessibilidade</label
        >
        <button
          id="toggle-daltonismo"
          class="btn-acao"
          style="
            width: 100%;
            background: var(--input-bg);
            color: var(--text-main);
            border: 2px solid transparent;
          "
        >
          👁️ Modo Daltônico: Desligado
        </button>
      </div>
      <button
        id="fechar-settings"
        class="btn-cancelar"
        style="margin-top: 20px"
      >
        Fechar
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
