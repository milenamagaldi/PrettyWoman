<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Tático - PowerScout</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="tema.js"></script>
  </head>
  <body>
    <script>
      if (!JSON.parse(localStorage.getItem("usuarioLogado")))
        window.location.href = "login.html";
    </script>

    <header class="duo-header" data-html2canvas-ignore="true">
      <div class="logo"><span class="cor-power">Power</span>Scout</div>
      <div style="display: flex; gap: 15px; align-items: center">
        <a
          href="home.html"
          style="color: #aaa; text-decoration: none; font-weight: bold"
          >⬅ Menu Principal</a
        >
        <button
          id="btn-settings"
          style="
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            outline: none;
          "
        >
          ⚙️
        </button>
      </div>
    </header>

    <div class="dashboard-container" id="area-relatorio">
      <div class="filtro-container" data-html2canvas-ignore="true">
        <h2>Análise <span class="cor-duo">Tática</span></h2>
        <div style="display: flex; gap: 10px; align-items: center">
          <select id="seletor-partida">
            <option value="">Carregando partidas...</option>
          </select>
          <button id="btn-exportar-pdf" class="btn-acao btn-duo-primary">
            📄 Gerar PDF
          </button>
        </div>
      </div>

      <div class="painel-ia">
        <h3 style="color: var(--duo-purple)">
          🤖 Síntese de Inteligência Tática
        </h3>
        <p id="texto-analise-ia">
          Aguardar processamento de dados da partida...
        </p>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card kpi-gols">
          <h3>⚽ Gols</h3>
          <div class="valor" id="kpi-gols">0</div>
        </div>
        <div class="kpi-card kpi-passes-c">
          <h3>✅ Passes Certos</h3>
          <div class="valor" id="kpi-passes-c">0</div>
        </div>
        <div class="kpi-card kpi-passes-e">
          <h3>❌ Passes Errados</h3>
          <div class="valor" id="kpi-passes-e">0</div>
        </div>
        <div class="kpi-card kpi-intercep">
          <h3>🛡️ Interceptações</h3>
          <div class="valor" id="kpi-intercep">0</div>
        </div>
      </div>

      <div class="visao-dupla">
        <div class="painel-grafico">
          <h3 style="color: #aaa; margin-bottom: 15px">
            Desempenho por Jogador
          </h3>
          <canvas id="graficoDesempenho"></canvas>
        </div>
        <div class="painel-heatmap">
          <h3 style="color: #aaa; text-align: center">
            Mapa de Calor da Equipa
          </h3>
          <div class="heatmap-container" id="campo-heatmap">
            <svg
              viewBox="0 0 800 500"
              width="100%"
              height="100%"
              style="position: absolute; z-index: 1"
            >
              <rect
                x="20"
                y="20"
                width="760"
                height="460"
                fill="none"
                stroke="rgba(255,255,255,0.5)"
                stroke-width="4"
                rx="15"
              />
              <line
                x1="400"
                y1="20"
                x2="400"
                y2="480"
                stroke="rgba(255,255,255,0.5)"
                stroke-width="4"
              />
              <circle
                cx="400"
                cy="250"
                r="70"
                fill="none"
                stroke="rgba(255,255,255,0.5)"
                stroke-width="4"
              />
              <circle cx="400" cy="250" r="6" fill="rgba(255,255,255,0.5)" />
              <rect
                x="20"
                y="125"
                width="120"
                height="250"
                fill="none"
                stroke="rgba(255,255,255,0.5)"
                stroke-width="4"
                rx="10"
              />
              <rect
                x="660"
                y="125"
                width="120"
                height="250"
                fill="none"
                stroke="rgba(255,255,255,0.5)"
                stroke-width="4"
                rx="10"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div
      id="modal-settings"
      class="escondido duo-modal"
      style="
        width: 320px;
        text-align: center;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 999;
      "
    >
      <h4 style="color: var(--text-main)">⚙️ Definições</h4>
      <div class="form-grupo" style="text-align: left">
        <label
          style="
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
          "
          >Aparência</label
        >
        <button
          id="toggle-tema"
          class="btn-acao"
          style="
            width: 100%;
            background: var(--input-bg);
            color: var(--text-main);
            border: 2px solid transparent;
          "
        >
          🌙 Modo Escuro Ativo
        </button>
      </div>
      <div class="form-grupo" style="margin-top: 20px; text-align: left">
        <label
          style="
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
          "
          >Acessibilidade</label
        >
        <button
          id="toggle-daltonismo"
          class="btn-acao"
          style="
            width: 100%;
            background: var(--input-bg);
            color: var(--text-main);
            border: 2px solid transparent;
          "
        >
          👁️ Modo Daltônico: Desligado
        </button>
      </div>
      <button
        id="fechar-settings"
        class="btn-cancelar"
        style="margin-top: 20px"
      >
        Fechar
      </button>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
